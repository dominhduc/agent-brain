name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./... -count=1 -race

      - name: Build
        run: go build -buildvcs=false -o /dev/null ./cmd/brain

  cross-platform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build all platforms
        run: |
          GOOS=linux GOARCH=amd64 go build -buildvcs=false -o /dev/null ./cmd/brain
          GOOS=linux GOARCH=arm64 go build -buildvcs=false -o /dev/null ./cmd/brain
          GOOS=darwin GOARCH=amd64 go build -buildvcs=false -o /dev/null ./cmd/brain
          GOOS=darwin GOARCH=arm64 go build -buildvcs=false -o /dev/null ./cmd/brain
          GOOS=windows GOARCH=amd64 go build -buildvcs=false -o /dev/null ./cmd/brain
          GOOS=windows GOARCH=arm64 go build -buildvcs=false -o /dev/null ./cmd/brain
